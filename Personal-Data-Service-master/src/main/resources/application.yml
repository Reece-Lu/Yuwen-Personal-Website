server:
  port: 9090

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # Credentials and URL are injected by docker-compose via SPRING_DATASOURCE_* env vars.
    # The values below are only fallbacks for running the service locally outside Docker.
    url: jdbc:mysql://localhost:3306/personal_website?serverTimezone=GMT-8
    username: root
    password: ""
    hikari:
      minimum-idle: 3
      maximum-pool-size: 10
      max-lifetime: 30000
      connection-test-query: SELECT 1

    jpa:
      h2:
        console:
          enabled: true
          path: /h2-console
      show-sql: true
      generate-ddl: true
      hibernate:
        ddl-auto: update
        naming:
          physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
      properties:
        hibernate:
          dialect: org.hibernate.dialect.MySQL8Dialect
          format_sql: true

app:
  file:
#    storage-location: /Users/yuwen/Downloads/notescover
    storage-location: /root/notescover