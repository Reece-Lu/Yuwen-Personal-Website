# Gateway nginx — mirrors the original meetyuwen.com path layout.
#
# Path map:
#   /                       -> react-frontend (Yuwen Portfolio)
#   /springapp/             -> personal-data-service (Spring Boot, 9090)
#   /api/                   -> fastapi-service (8000)
#   /quant/                 -> streamlit-service (8501, QQQ SMA monitor)
#   /residentialcomplex/    -> vue-frontend (PMS UI, publicPath)
#   /complex/               -> pms-server (Spring Boot, 9091)  — Vue calls this
#   /notes/                 -> learning-journey-hub (only with `--profile docs`)

upstream react_frontend       { server react-frontend:80; }
upstream vue_frontend         { server vue-frontend:80; }
upstream personal_data        { server personal-data-service:9090; }
upstream pms_server           { server pms-server:9091; }
upstream fastapi_service      { server fastapi-service:8000; }
upstream streamlit_service    { server streamlit-service:8501; }

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 50m;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Docker's embedded DNS — needed for lazy-resolved upstreams below.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # --- Personal-Data-Service (Spring Boot) ---
    # React frontend calls https://.../springapp/<endpoint>; backend exposes /<endpoint> at root.
    location /springapp/ {
        proxy_pass http://personal_data/;
    }

    # --- FastAPI (QML model serving) ---
    location /api/ {
        proxy_pass http://fastapi_service/;
        proxy_read_timeout 120s;
    }

    # --- Streamlit QQQ SMA monitor ---
    # Streamlit serves itself at base path /quant (see streamlit-service
    # Dockerfile env). Trailing slash is intentional — otherwise nginx would
    # prefix-match /quantmonitor (the React wrapper page) and proxy it here.
    # WebSocket upgrade headers are needed for Streamlit's live event stream.
    location = /quant { return 301 /quant/; }
    location /quant/ {
        proxy_pass http://streamlit_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # --- PMS server (Spring Boot, controllers mapped at /pms/...) ---
    # Vue calls https://.../complex/pms/...; strip /complex/ so /pms/... reaches backend.
    location /complex/ {
        proxy_pass http://pms_server/;
    }

    # --- Vue static site (publicPath /residentialcomplex/) ---
    location /residentialcomplex/ {
        proxy_pass http://vue_frontend;
    }

    # --- Writerside docs (only available with --profile docs) ---
    # Lazy DNS resolution: if learning-journey-hub container isn't running,
    # nginx still starts; requests to /notes/ return 502 until you bring it up.
    location /notes/ {
        set $notes_upstream learning-journey-hub:80;
        proxy_pass http://$notes_upstream;
    }

    # --- React main site (default catch-all, must be last) ---
    location / {
        proxy_pass http://react_frontend;
    }
}
