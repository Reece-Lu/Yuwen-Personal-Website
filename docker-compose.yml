name: meetyuwen

# ── Profiles ─────────────────────────────────────────────────────────────────
# Default `docker compose up` starts everything EXCEPT services tagged with a
# profile. To also start the docs site, use `docker compose --profile docs up`.

services:

  gateway:
    build:
      context: ./nginx
    container_name: meetyuwen-gateway
    ports:
      - "${GATEWAY_PORT:-80}:80"
    depends_on:
      - react-frontend
      - vue-frontend
      - personal-data-service
      - pms-server
      - fastapi-service
      - streamlit-service
    networks:
      - meetyuwen
    restart: unless-stopped

  react-frontend:
    build:
      context: ./Yuwen-Personal-Website-main
    container_name: meetyuwen-react
    expose:
      - "80"
    networks:
      - meetyuwen
    restart: unless-stopped

  vue-frontend:
    build:
      context: ./propertymanagement-graduationproject-master
    container_name: meetyuwen-vue
    expose:
      - "80"
    networks:
      - meetyuwen
    restart: unless-stopped

  personal-data-service:
    build:
      context: ./Personal-Data-Service-master
    container_name: meetyuwen-personal-data
    expose:
      - "9090"
    environment:
      SPRING_DATASOURCE_URL: ${PERSONAL_DATA_DB_URL:-jdbc:mysql://host.docker.internal:3306/personal_website?serverTimezone=GMT-8}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-Tapebook123#}
      APP_FILE_STORAGE_LOCATION: /data/notescover
    volumes:
      - ${NOTESCOVER_HOST_DIR:-./data/notescover}:/data/notescover
      - ${DOCUMENTS_HOST_DIR:-./data/documents}:/root/documents
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - meetyuwen
    restart: unless-stopped

  pms-server:
    build:
      context: ./propertymanagement-graduationproject-server-master
    container_name: meetyuwen-pms-server
    expose:
      - "9091"
    environment:
      SPRING_DATASOURCE_URL: ${PMS_DB_URL:-jdbc:mysql://host.docker.internal:3306/residentialcomplex?serverTimezone=GMT-8}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-Tapebook123#}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - meetyuwen
    restart: unless-stopped

  fastapi-service:
    build:
      context: ./fastapi-service
    container_name: meetyuwen-fastapi
    expose:
      - "8000"
    environment:
      ROOT_PATH: /api
      QUANT_DUCKDB_PATH: /data/quant/quant_pilot.duckdb
    volumes:
      - ${QUANT_DATA_HOST_DIR:-./data/quant}:/data/quant
    networks:
      - meetyuwen
    restart: unless-stopped

  streamlit-service:
    build:
      context: ./streamlit-service
    container_name: meetyuwen-streamlit
    expose:
      - "8501"
    environment:
      QUANT_DUCKDB_PATH: /data/quant/quant_pilot.duckdb
    volumes:
      - ${QUANT_DATA_HOST_DIR:-./data/quant}:/data/quant:ro
    depends_on:
      - fastapi-service
    networks:
      - meetyuwen
    restart: unless-stopped

  # Heavy/optional — start with `docker compose --profile docs up`
  learning-journey-hub:
    profiles: ["docs"]
    build:
      context: ./LearningJourneyHub-master
    container_name: meetyuwen-notes
    expose:
      - "80"
    networks:
      - meetyuwen
    restart: unless-stopped

networks:
  meetyuwen:
    driver: bridge
